services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  mongo:
    image: mongo:7
    container_name: fraud-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: fraud-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fraud-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - fraud-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Backend — API Server ────────────────────────────────────────────────────

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: api
    container_name: fraud-api
    ports:
      - "8080:8080"   # REST API
      - "8081:8081"   # WebSocket
    environment:
      MONGO_URI:    mongodb://mongo:27017
      REDIS_ADDR:   redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      PORT:         "8080"
    networks:
      - fraud-net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ── Backend — Fraud Worker ──────────────────────────────────────────────────

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: worker
    container_name: fraud-worker
    environment:
      MONGO_URI:    mongodb://mongo:27017
      REDIS_ADDR:   redis:6379
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    networks:
      - fraud-net
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # API and WS URLs are baked into the Next.js bundle at build time.
        # Change these if the app is accessed from a non-localhost address.
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
        NEXT_PUBLIC_WS_URL:  ws://localhost:8081/transactions
    container_name: fraud-frontend
    ports:
      - "3000:3000"
    networks:
      - fraud-net
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Demo Data Seeder (one-shot, only with --profile seed) ──────────────────
  #
  # Usage:  docker compose --profile seed run --rm seed
  #
  # Loads 30 days of baseline + fraud transactions so the dashboard
  # shows a meaningful chart immediately after startup.

  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: seed
    container_name: fraud-seed
    environment:
      API_URL: http://api:8080/api/v1/transactions
    networks:
      - fraud-net
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - seed

networks:
  fraud-net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
  rabbitmq_data:
